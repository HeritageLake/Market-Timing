<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heritage Lake Advisors — Market Timing Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Raleway:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">

<!-- React & Recharts CDN -->
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-is@18.2.0/umd/react-is.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>

<!--
  NOTE: Babel standalone is kept for JSX support without a build step.
  This adds ~748KB to initial load. When you're ready to set up a build
  tool (Vite, esbuild, etc.), remove this script and pre-compile app.jsx.
  See README.md for details.
-->
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.0/babel.min.js"></script>
</head>
<body>
<div id="root">
  <div class="loading-screen">
    <div class="loading-spinner"></div>
    <div>Loading simulator…</div>
  </div>
</div>

<!-- Data loading + app bootstrap -->
<script>
  // Fetch market data, then load the app
  window.APP_DATA_READY = fetch('data.json')
    .then(function(res) {
      if (!res.ok) throw new Error('Failed to load data.json (HTTP ' + res.status + ')');
      return res.json();
    })
    .then(function(data) {
      window.RAW_DAILY = data.dailyPrices;
      window.DY = data.dividendYields;
      console.log('Market data loaded:', window.RAW_DAILY.length, 'daily records');
    })
    .catch(function(err) {
      document.getElementById('root').innerHTML =
        '<div class="loading-screen" style="color:#c46b5e">' +
        '<div style="font-size:16px;font-weight:600">Failed to load market data</div>' +
        '<div style="font-size:12px;margin-top:8px;opacity:0.7">' + err.message + '</div>' +
        '<div style="font-size:11px;margin-top:12px;opacity:0.5">Make sure data.json is in the same directory and you\'re using a web server (not file://)</div>' +
        '</div>';
      throw err;
    });
</script>

<!-- Simulation logic (pure functions, no JSX) -->
<script src="js/simulation.js"></script>

<!-- React application (JSX — requires Babel) -->
<script type="text/babel" data-presets="react" src="js/app.jsx"></script>
</body>
</html>
